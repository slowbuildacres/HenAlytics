<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#F4EDE0">

<!-- SEO basics -->
<title>Henalytics — Homestead tracker for gardens, eggs & meat birds</title>
<meta name="description" content="A simple homestead tracker for gardens, egg layers, and meat chickens. Log entries, attach photos, share with farmhands, and watch the patterns emerge.">
<meta name="keywords" content="homestead, homesteading, garden tracker, egg layer tracker, chicken tracker, backyard chickens, small farm app">
<link rel="canonical" href="https://henalytics.com/">

<!-- Open Graph (Facebook, LinkedIn, iMessage previews, etc.) -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://henalytics.com/">
<meta property="og:title" content="Henalytics — Homestead tracker for gardens, eggs & meat birds">
<meta property="og:description" content="A simple homestead tracker for gardens, egg layers, and meat chickens.">
<meta property="og:image" content="https://henalytics.com/icon-512.png">
<meta property="og:site_name" content="Henalytics">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Henalytics — Homestead tracker">
<meta name="twitter:description" content="A simple homestead tracker for gardens, egg layers, and meat chickens.">
<meta name="twitter:image" content="https://henalytics.com/icon-512.png">

<!-- Favicon (browser tab) -->
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">

<!-- Web App Manifest (Android home screen) -->
<link rel="manifest" href="/manifest.webmanifest">

<!-- iOS home-screen icon + standalone behavior -->
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<!-- App-mode / theme metadata -->
<meta name="application-name" content="Henalytics">
<meta name="mobile-web-app-capable" content="yes">

<style>
  html, body, #root { margin: 0; padding: 0; }
  body { background: #F4EDE0; }
  body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch((err) => {
        console.warn('Service worker registration failed:', err);
      });
    });
  }
</script>
</body>
</html>
