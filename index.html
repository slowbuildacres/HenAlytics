<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#F4EDE0">
<meta name="description" content="A simple homestead tracker for gardens, egg layers, and meat chickens.">

<title>Henalytics</title>

<!-- Standard favicon (browser tab) -->
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">

<!-- Web App Manifest (Android home screen, etc.) -->
<link rel="manifest" href="/manifest.webmanifest">

<!-- iOS home-screen icon + standalone behavior -->
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Henalytics">

<!-- Android theme color (matches the parchment background) -->
<meta name="application-name" content="Henalytics">
<meta name="mobile-web-app-capable" content="yes">

<style>
  html, body, #root { margin: 0; padding: 0; }
  body { background: #F4EDE0; }
  /* Respect iPhone notch / safe areas in standalone mode */
  body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
<script>
  // Register the service worker once the page has loaded.
  // We deliberately don't block rendering on this.
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch((err) => {
        console.warn('Service worker registration failed:', err);
      });
    });
  }
</script>
</body>
</html>
