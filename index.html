<!DOCTYPE html>
<html lang="en">
<head>

<meta name="mobile-web-app-capable" content="yes">

<style>
  html, body, #root { margin: 0; padding: 0; }
  body { background: #F4EDE0; }
  body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }

  /* Initial loading animation, shown before React boots up */
  .boot-load {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    background: #F4EDE0;
    background-image: radial-gradient(rgba(44,24,16,0.19) 0.5px, transparent 0.5px);
    background-size: 20px 20px;
    padding: 20px;
  }
  .boot-load svg { width: 100%; max-width: 360px; height: auto; }
  .boot-load .title { font-family: 'DM Serif Display', Georgia, serif; font-size: 22px; color: #2C1810; text-align: center; }
  .boot-load .sub { font-size: 13px; color: #5C4530; text-align: center; font-style: italic; }

  @keyframes boot-hen-sequence {
    0%   { transform: translate(0, 8px) scaleY(0.85); }
    20%  { transform: translate(0, 8px) scaleY(0.85); }
    25%  { transform: translate(0, 0) scaleY(1); }
    62%  { transform: translate(0, 0) scaleY(1); }
    65%  { transform: translate(8px, 0) scaleY(1); }
    100% { transform: translate(220px, -1px) scaleY(1); }
  }
  @keyframes boot-legs-show { 0%, 22% { opacity: 0; } 25%, 100% { opacity: 1; } }
  @keyframes boot-egg-whole {
    0%, 26%   { opacity: 0; transform: scale(1) rotate(0deg); }
    27%, 36%  { opacity: 1; transform: scale(1) rotate(0deg); }
    38% { transform: rotate(-4deg); opacity: 1; }
    40% { transform: rotate(4deg); opacity: 1; }
    42% { transform: rotate(-3deg); opacity: 1; }
    44% { transform: rotate(0deg); opacity: 1; }
    50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }
  @keyframes boot-egg-cracked {
    0%, 50%  { opacity: 0; }
    51%, 80% { opacity: 1; }
    81%, 100% { opacity: 0; }
  }
  @keyframes boot-egg-top {
    0%, 50%  { transform: translateY(0) rotate(0deg); }
    52%      { transform: translateY(-6px) rotate(-15deg); }
    54%      { transform: translateY(-3px) rotate(20deg); }
    56%      { transform: translateY(-8px) rotate(-30deg); }
    100%     { transform: translateY(-8px) rotate(-30deg); opacity: 0; }
  }
  @keyframes boot-chick {
    0%, 55%  { opacity: 0; transform: translate(0, 8px) scale(0); }
    57%      { opacity: 1; transform: translate(0, -2px) scale(1.1); }
    60%      { transform: translate(0, 0) scale(1); }
    65%      { transform: translate(0, -1px) scale(1); }
    68%      { transform: translate(0, 0) scale(1); }
    71%      { transform: translate(0, -1px) scale(1); }
    74%      { transform: translate(0, 0) scale(1); }
    80%      { transform: translate(20px, 0) scale(1); }
    100%     { transform: translate(220px, 0) scale(1); opacity: 1; }
  }
  .boot-hen { animation: boot-hen-sequence 8s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
  .boot-legs { animation: boot-legs-show 8s ease-in-out infinite; opacity: 0; }
  .boot-egg-whole { animation: boot-egg-whole 8s ease-in-out infinite; opacity: 0; transform-origin: 120px 148px; transform-box: fill-box; }
  .boot-egg-cracked { animation: boot-egg-cracked 8s ease-in-out infinite; opacity: 0; }
  .boot-egg-top { animation: boot-egg-top 8s ease-in-out infinite; transform-box: fill-box; transform-origin: bottom center; }
  .boot-chick { animation: boot-chick 8s ease-in-out infinite; opacity: 0; }
</style>
</head>
<body>
<div id="root">
  <!-- Bootstrap loading scene — shown until React mounts and replaces this -->
  <div class="boot-load">
    <svg viewBox="0 0 320 180" aria-hidden="true">
      <line x1="0" y1="160" x2="320" y2="160" stroke="#8B6F47" stroke-width="1.5" opacity="0.4"/>
      <g>
        <ellipse cx="120" cy="158" rx="42" ry="8" fill="#8B6F47" opacity="0.6"/>
        <line x1="85" y1="158" x2="100" y2="148" stroke="#8B6F47" stroke-width="1.5"/>
        <line x1="100" y1="158" x2="115" y2="146" stroke="#8B6F47" stroke-width="1.5"/>
        <line x1="125" y1="146" x2="140" y2="158" stroke="#8B6F47" stroke-width="1.5"/>
        <line x1="140" y1="148" x2="155" y2="158" stroke="#8B6F47" stroke-width="1.5"/>
      </g>

      <g>
        <g class="boot-egg-whole">
          <ellipse cx="120" cy="148" rx="11" ry="14" fill="#FAF5EA" stroke="#2C1810" stroke-width="1.2"/>
          <ellipse cx="116" cy="143" rx="2" ry="3" fill="#fff" opacity="0.7"/>
        </g>
        <g class="boot-egg-cracked">
          <path d="M 109 148 Q 109 162 120 162 Q 131 162 131 148 L 130 146 L 127 149 L 122 144 L 117 149 L 113 145 L 110 148 Z" fill="#FAF5EA" stroke="#2C1810" stroke-width="1.2"/>
          <g class="boot-egg-top">
            <path d="M 110 148 L 113 145 L 117 149 L 122 144 L 127 149 L 130 146 Q 131 138 120 134 Q 109 138 110 148 Z" fill="#FAF5EA" stroke="#2C1810" stroke-width="1.2"/>
          </g>
        </g>
        <g class="boot-chick">
          <circle cx="120" cy="148" r="7" fill="#E8B547" stroke="#2C1810" stroke-width="1"/>
          <circle cx="120" cy="143" r="5" fill="#F2D58A" stroke="#2C1810" stroke-width="1"/>
          <circle cx="118" cy="142" r="1" fill="#2C1810"/>
          <path d="M 115 144 L 112 145 L 115 146 Z" fill="#C84B31" stroke="#2C1810" stroke-width="0.6"/>
          <ellipse cx="122" cy="148" rx="3" ry="2" fill="#F2D58A" stroke="#2C1810" stroke-width="0.6"/>
          <line x1="118" y1="155" x2="118" y2="158" stroke="#2C1810" stroke-width="0.8"/>
          <line x1="122" y1="155" x2="122" y2="158" stroke="#2C1810" stroke-width="0.8"/>
        </g>
      </g>

      <g class="boot-hen">
        <ellipse cx="120" cy="135" rx="22" ry="18" fill="#8B6F47" stroke="#2C1810" stroke-width="1.5"/>
        <ellipse cx="115" cy="135" rx="12" ry="10" fill="#C9A77B" stroke="#2C1810" stroke-width="1.2" transform="rotate(-15 115 135)"/>
        <path d="M 138 130 L 152 122 L 150 132 L 154 138 L 144 138 Z" fill="#8B6F47" stroke="#2C1810" stroke-width="1.2"/>
        <circle cx="105" cy="118" r="10" fill="#8B6F47" stroke="#2C1810" stroke-width="1.5"/>
        <path d="M 101 109 Q 99 104 102 105 Q 100 100 105 102 Q 104 98 108 101 L 108 110 Z" fill="#C84B31" stroke="#2C1810" stroke-width="1"/>
        <path d="M 96 119 L 91 121 L 96 122 Z" fill="#E8B547" stroke="#2C1810" stroke-width="1"/>
        <circle cx="103" cy="116" r="1.5" fill="#2C1810"/>
        <path d="M 99 124 Q 97 128 100 128 Q 103 127 102 124 Z" fill="#C84B31" stroke="#2C1810" stroke-width="0.8"/>
        <g class="boot-legs">
          <line x1="115" y1="153" x2="115" y2="160" stroke="#2C1810" stroke-width="1.5"/>
          <line x1="125" y1="153" x2="125" y2="160" stroke="#2C1810" stroke-width="1.5"/>
          <line x1="112" y1="160" x2="118" y2="160" stroke="#2C1810" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="122" y1="160" x2="128" y2="160" stroke="#2C1810" stroke-width="1.5" stroke-linecap="round"/>
        </g>
      </g>
    </svg>
    <div class="title">Henalytics</div>
    <div class="sub">gathering your homestead's data…</div>
  </div>
</div>
<script type="module" src="/src/main.jsx"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch((err) => {
        console.warn('Service worker registration failed:', err);
      });
    });
  }
</script>
</body>
</html>
